ai_usage_summary: |
  Briefly describe how AI tools were used. Examples:
  - "Used Gemini for architectural discussion, reasoning logic generation, and pipeline structure design (Pandas filtering + Semantic Search). Used Copilot in VS Code for autocomplete and small debugging. No candidate data was fed to any LLM."
  
# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Two-stage hybrid ranking architecture optimized for CPU efficiency and trap evasion. 
  Stage 1 utilizes a Pandas-based hard-filtering engine to immediately eliminate synthetic honeypots, pure-services industries, and non-coding title chasers, while enforcing logistical constraints (location, notice periods). 
  Stage 2 applies a local NLP model (all-MiniLM-L6-v2) to compute semantic similarity between candidate career histories and a highly specific JD vector, effectively identifying applied ML engineers who built real recommendation systems even if they omitted trendy buzzwords. 
  The final ranking uses a multiplicative matrix combining the Semantic Fit Score with a Behavioral Merit Score (weighted across recruiter response rates, GitHub activity, and market demand). Finally, an Explainable AI (XAI) module generates dynamic reasoning strings for the top 100 candidates, explicitly citing the specific technical and behavioral signals driving their selection. The pipeline processes 100K candidates in under a minute.

